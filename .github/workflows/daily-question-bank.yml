name: Daily Question Bank Generation

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate question bank updates
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GOOGLE_GENERATIVE_AI_API_KEY }}
          GEMINI_MODEL: gemini-2.5-flash
          DAILY_SET_COUNT: "5"
          DAILY_ROLEPLAY_SET_COUNT: "2"
        run: pnpm run generate:question-bank

      - name: Create pull request
        uses: peter-evans/create-pull-request@v6
        with:
          branch: chore/daily-question-bank-${{ github.run_id }}
          title: "Add daily generated combo and roleplay sets"
          commit-message: "Add daily generated combo and roleplay sets"
          body: |
            Automated daily update via Gemini.

            - combo: survey : surprise ~= 3 : 2, stages 1→2→3
            - roleplay: situation_questions → problem_solving → similar_experience
            - surprise=true only on surprise combo topics
